# MimamoriKanshi System Monitor Configuration

# Image dimensions
width_px: 26
height_px: 10
latest_value_px: 3

# Colors
background_color: "#000000"
border_px: 1
border_color: "#404040"
separator_px: 1
separator_color: "#404040"

# Text
text_color: "#FFFFFF"
text_left_padding_px: 1
text_font_family: "/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf"
text_font_size: 8

# CPU
cpu_color: "#00FF00"

# Memory
memory_color: "#FFFF00"

# Disk
disks:
  - sda
disk_read_color: "#00FFFF"
disk_read_max_mib_s: 100
disk_write_color: "#FF00FF"
disk_write_max_mib_s: 100

# Network
networks:
  - eth0
network_download_color: "#0080FF"
network_download_max_mib_s: 100
network_upload_color: "#FF8000"
network_upload_max_mib_s: 100

# Timing
tick_ms: 500
genmon_after_daemon_min_gap_ms: 100
daemon_exit_if_genmon_inactive_sec: 10
